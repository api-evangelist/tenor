aid: tenor
name: Tenor
description: >
  Tenor is Google's GIF search engine REST API that enables developers to integrate
  animated GIF search, trending GIFs, featured content, and category browsing into
  applications. The API processes over 300 million searches per day across 45+ languages
  with localized, region-appropriate content. Note: As of January 2026, Google is no
  longer accepting new API clients; the API is scheduled for sunset on June 30, 2026.
