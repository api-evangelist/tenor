apis:
  - aid: tenor:tenor-api
    name: Tenor GIF Search API
    description: >
      REST API for searching and browsing animated GIFs and stickers. Provides endpoints
      for GIF search, trending content, featured GIFs, categories, search suggestions,
      autocomplete, and share registration. Built on Google's Tenor platform with support
      for 45+ languages and localized content. Base URL: https://tenor.googleapis.com/v2/
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
